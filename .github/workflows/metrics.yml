name: Metrics
on:
  # Rebuild daily so the stats stay fresh…
  schedule:
    - cron: "0 0 * * *"
  # …and let you trigger it by hand from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          # Classic PAT stored as a repo secret (repo + read:user scopes).
          token: ${{ secrets.METRICS_TOKEN }}
          user: bunseueng
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Phnom_Penh

          # Most-used languages breakdown.
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
